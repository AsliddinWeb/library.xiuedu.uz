{% extends "layouts/base.html" %}
{% load static %}

{% block title %}{{ book.title }} — O'qish{% endblock %}

{% block header %}{% endblock %}
{% block footer %}{% endblock %}

{% block content %}
<div class="flex min-h-screen flex-col bg-navy-950">
    {# Toolbar #}
    <div class="sticky top-0 z-20 flex items-center justify-between gap-4 border-b border-navy-800 bg-navy-950/90 px-4 py-3 backdrop-blur">
        <a href="{% url 'book_app:student_book_detail' book.pk %}" class="inline-flex items-center gap-1.5 text-sm font-medium text-navy-300 transition hover:text-white">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 18l-6-6 6-6"/></svg>
            Chiqish
        </a>
        <p class="hidden truncate font-serif text-sm font-semibold text-white sm:block">{{ book.title }}</p>
        <div class="flex items-center gap-2 text-sm text-navy-200">
            <button id="prev" class="rounded-lg border border-navy-700 px-3 py-1.5 transition hover:bg-navy-800 disabled:opacity-40">‹</button>
            <span class="tabular-nums"><span id="pageNum">–</span> / <span id="pageCount">–</span></span>
            <button id="next" class="rounded-lg border border-navy-700 px-3 py-1.5 transition hover:bg-navy-800 disabled:opacity-40">›</button>
        </div>
    </div>

    {# Canvas #}
    <div class="flex flex-1 justify-center overflow-auto px-2 py-6">
        <div id="status" class="mt-20 text-center text-navy-300">Yuklanmoqda…</div>
        <canvas id="pdf-canvas" class="hidden h-fit max-w-full rounded-lg bg-white shadow-2xl" oncontextmenu="return false"></canvas>
    </div>
</div>

<script type="module">
import * as pdfjsLib from "{% static 'js/vendor/pdf.min.mjs' %}";
pdfjsLib.GlobalWorkerOptions.workerSrc = "{% static 'js/vendor/pdf.worker.min.mjs' %}";

const url = "{% url 'reading:stream_ebook' book.pk %}";
const progressUrl = "{% url 'reading:save_progress' book.pk %}";
const csrf = "{{ csrf_token }}";
const startPage = {{ start_page|default:0 }};

const canvas = document.getElementById('pdf-canvas');
const ctx = canvas.getContext('2d');
const status = document.getElementById('status');
const pageNumEl = document.getElementById('pageNum');
const pageCountEl = document.getElementById('pageCount');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');

let pdfDoc = null, pageNum = 1, rendering = false, pending = null;

function renderPage(num) {
    rendering = true;
    pdfDoc.getPage(num).then((page) => {
        const containerWidth = Math.min(canvas.parentElement.clientWidth - 16, 900);
        const unscaled = page.getViewport({ scale: 1 });
        const scale = containerWidth / unscaled.width;
        const viewport = page.getViewport({ scale });
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        page.render({ canvasContext: ctx, viewport }).promise.then(() => {
            rendering = false;
            if (pending !== null) { const p = pending; pending = null; renderPage(p); }
        });
    });
    pageNumEl.textContent = num;
    prevBtn.disabled = num <= 1;
    nextBtn.disabled = num >= pdfDoc.numPages;
    saveProgress(num);
}

function queueRender(num) {
    if (rendering) pending = num; else renderPage(num);
}

let saveTimer = null;
function saveProgress(num) {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
        const percent = Math.round((num / pdfDoc.numPages) * 100);
        const body = new URLSearchParams({ mode: 'READ', position: num, percent });
        fetch(progressUrl, { method: 'POST', headers: { 'X-CSRFToken': csrf }, body });
    }, 800);
}

prevBtn.addEventListener('click', () => { if (pageNum > 1) { pageNum--; queueRender(pageNum); } });
nextBtn.addEventListener('click', () => { if (pageNum < pdfDoc.numPages) { pageNum++; queueRender(pageNum); } });
document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft' && pageNum > 1) { pageNum--; queueRender(pageNum); }
    if (e.key === 'ArrowRight' && pageNum < pdfDoc.numPages) { pageNum++; queueRender(pageNum); }
});

pdfjsLib.getDocument(url).promise.then((pdf) => {
    pdfDoc = pdf;
    pageCountEl.textContent = pdf.numPages;
    pageNum = (startPage >= 1 && startPage <= pdf.numPages) ? startPage : 1;
    status.classList.add('hidden');
    canvas.classList.remove('hidden');
    renderPage(pageNum);
}).catch((err) => {
    status.textContent = "Kitobni yuklab bo'lmadi.";
    console.error(err);
});
</script>
{% endblock %}
