{% extends "layouts/base.html" %}

{% block title %}Muallifni tahrirlash — XIU Kutubxona{% endblock %}

{% block content %}
<div class="mx-auto max-w-2xl px-4 py-10 sm:px-6 lg:px-8">
    <a href="{% url 'book_app:authors_list' %}" class="inline-flex items-center gap-1.5 text-sm font-medium text-navy-500 transition hover:text-navy-800">
        <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 18l-6-6 6-6"/></svg>
        Mualliflar ro'yxati
    </a>

    <div class="mt-6">
        <span class="text-xs font-semibold uppercase tracking-[0.2em] text-gold-700">Tahrirlash</span>
        <h1 class="mt-3 font-serif text-3xl font-semibold tracking-tight text-navy-950">{{ author.full_name }}</h1>
    </div>

    <div class="mt-8 rounded-2xl border border-navy-100 bg-paper p-6 shadow-soft sm:p-8">
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-navy-800">Ism Familiya</label>
                <input type="text" name="full_name" value="{{ author.full_name }}" required
                       class="mt-2 w-full rounded-xl border border-navy-200 bg-cream/40 px-4 py-2.5 text-sm text-navy-900 transition focus:border-gold-400 focus:ring-2 focus:ring-gold-200 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-navy-800">Qisqacha tavsif</label>
                <textarea name="bio" rows="4"
                          class="mt-2 w-full rounded-xl border border-navy-200 bg-cream/40 px-4 py-2.5 text-sm text-navy-900 transition focus:border-gold-400 focus:ring-2 focus:ring-gold-200 focus:outline-none">{{ author.bio|default:'' }}</textarea>
            </div>
            <div class="flex gap-3 pt-2">
                <button type="submit" class="rounded-full bg-navy-900 px-6 py-2.5 text-sm font-semibold text-white transition hover:bg-navy-800">O'zgarishlarni saqlash</button>
                <a href="{% url 'book_app:authors_list' %}" class="rounded-full border border-navy-200 px-6 py-2.5 text-sm font-semibold text-navy-700 transition hover:bg-navy-50">Bekor qilish</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
