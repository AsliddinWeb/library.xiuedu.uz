{% load static %}
<a href="{% url 'book_app:student_book_detail' book.pk %}"
   class="group flex flex-col overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm transition hover:-translate-y-0.5 hover:shadow-md">
    <div class="relative aspect-3/4 overflow-hidden bg-slate-100">
        {% if book.cover_image %}
            <img src="{{ book.cover_image.url }}" alt="{{ book.title }}"
                 class="h-full w-full object-cover transition group-hover:scale-105" loading="lazy">
        {% else %}
            <div class="flex h-full w-full items-center justify-center text-4xl text-slate-300">📚</div>
        {% endif %}
        {% if book.category %}
            <span class="absolute left-2 top-2 rounded-full bg-white/90 px-2 py-0.5 text-xs font-medium text-brand-700 shadow-sm">
                {{ book.category.name }}
            </span>
        {% endif %}
    </div>
    <div class="flex flex-1 flex-col p-3">
        <h3 class="line-clamp-2 text-sm font-semibold text-slate-900 group-hover:text-brand-700">{{ book.title }}</h3>
        <p class="mt-1 line-clamp-1 text-xs text-slate-500">
            {% for author in book.authors.all %}{{ author.full_name }}{% if not forloop.last %}, {% endif %}{% empty %}Muallif noma'lum{% endfor %}
        </p>
    </div>
</a>
