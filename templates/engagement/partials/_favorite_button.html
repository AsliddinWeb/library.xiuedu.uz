<button id="fav-btn"
        hx-post="{% url 'engagement:toggle_favorite' book.pk %}" hx-swap="outerHTML"
        class="inline-flex items-center gap-2 rounded-full border px-5 py-3 text-sm font-semibold shadow-soft transition
        {% if is_favorite %}border-red-200 bg-red-50 text-red-600 hover:bg-red-100{% else %}border-navy-200 bg-paper text-navy-700 hover:bg-white{% endif %}">
    <svg class="h-4 w-4" fill="{% if is_favorite %}currentColor{% else %}none{% endif %}" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 14c1.5-1.5 3-3.4 3-5.5A4.5 4.5 0 0 0 12 5 4.5 4.5 0 0 0 2 8.5c0 2.1 1.5 4 3 5.5l7 7z"/>
    </svg>
    {% if is_favorite %}Sevimlilarda{% else %}Sevimlilarga{% endif %}
</button>
