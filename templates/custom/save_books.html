{% extends "layouts/base.html" %}

{% block title %}Kitob import — XIU Kutubxona{% endblock %}

{% block content %}
<div class="mx-auto max-w-2xl px-4 py-10 sm:px-6 lg:px-8">
    <a href="/dashboard/" class="inline-flex items-center gap-1.5 text-sm font-medium text-navy-500 transition hover:text-navy-800">
        <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 18l-6-6 6-6"/></svg>
        Panelga qaytish
    </a>

    <div class="mt-6">
        <span class="text-xs font-semibold uppercase tracking-[0.2em] text-gold-700">Kutubxonachi</span>
        <h1 class="mt-3 font-serif text-4xl font-semibold tracking-tight text-navy-950">Kitob import</h1>
        <p class="mt-2 text-navy-600">Tashqi API manbasidan kitoblarni ommaviy yuklash.</p>
    </div>

    <div class="mt-8 rounded-2xl border border-navy-100 bg-paper p-6 shadow-soft sm:p-8">
        <form id="saveBooksForm">
            {% csrf_token %}
            <label for="url" class="block text-sm font-medium text-navy-800">API URL</label>
            <input type="url" id="url" name="url" required placeholder="https://..."
                   class="mt-2 w-full rounded-xl border border-navy-200 bg-cream/40 px-4 py-3 text-sm text-navy-900 transition placeholder:text-navy-400 focus:border-gold-400 focus:ring-2 focus:ring-gold-200 focus:outline-none">
            <p class="mt-2 text-xs text-navy-400">Namuna: https://arm-admin.xiuedu.uz/api/v1/books/?page=1</p>

            <button type="submit"
                    class="mt-5 inline-flex w-full items-center justify-center gap-2 rounded-full bg-navy-900 px-6 py-3 text-sm font-semibold text-white shadow-soft transition hover:bg-navy-800 disabled:opacity-60">
                <svg class="h-4 w-4 text-gold-300" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v12m0 0 4-4m-4 4-4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
                Kitoblarni yuklash
            </button>
        </form>

        <div id="responseMessage" class="mt-4"></div>
    </div>
</div>

<script>
    document.getElementById('saveBooksForm').addEventListener('submit', async function (e) {
        e.preventDefault();
        const btn = this.querySelector('button[type="submit"]');
        const box = document.getElementById('responseMessage');
        btn.disabled = true;
        box.innerHTML = '<div class="rounded-xl bg-navy-50 px-4 py-3 text-sm text-navy-600">Iltimos, kuting…</div>';
        try {
            const response = await fetch('', { method: 'POST', body: new FormData(this) });
            const data = await response.json();
            if (response.ok) {
                box.innerHTML = `<div class="rounded-xl bg-emerald-50 px-4 py-3 text-sm font-medium text-emerald-700 ring-1 ring-emerald-100">${data.success}</div>`;
            } else {
                box.innerHTML = `<div class="rounded-xl bg-red-50 px-4 py-3 text-sm font-medium text-red-700 ring-1 ring-red-100">Xatolik: ${data.error || "noma'lum"}</div>`;
            }
        } catch (err) {
            box.innerHTML = `<div class="rounded-xl bg-red-50 px-4 py-3 text-sm font-medium text-red-700 ring-1 ring-red-100">Server bilan bog'lanishda xatolik.</div>`;
        } finally {
            btn.disabled = false;
        }
    });
</script>
{% endblock %}
