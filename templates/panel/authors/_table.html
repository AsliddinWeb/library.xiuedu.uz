{% load static %}
<div class="overflow-hidden rounded-xl border border-navy-100 bg-paper shadow-soft">
    <table class="w-full text-left text-sm">
        <thead class="border-b border-navy-100 bg-navy-50/50 text-xs uppercase tracking-wide text-navy-500">
            <tr>
                <th class="px-4 py-3 font-semibold">Muallif</th>
                <th class="px-4 py-3 font-semibold">Tavsif</th>
                <th class="px-4 py-3 font-semibold">Kitoblar</th>
                <th class="px-4 py-3 text-right font-semibold">Amal</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-navy-50">
            {% for author in authors %}
            <tr class="transition hover:bg-navy-50/40">
                <td class="px-4 py-3">
                    <div class="flex items-center gap-3">
                        <span class="flex h-9 w-9 flex-none items-center justify-center rounded-full bg-navy-900 text-xs font-semibold text-gold-300">{{ author.full_name|slice:":1"|upper }}</span>
                        <span class="font-medium text-navy-900">{{ author.full_name }}</span>
                    </div>
                </td>
                <td class="px-4 py-3 text-navy-500"><span class="line-clamp-1 max-w-md">{{ author.bio|default:"—" }}</span></td>
                <td class="px-4 py-3 text-navy-600">{{ author.books }}</td>
                <td class="px-4 py-3">
                    <div class="flex items-center justify-end gap-1">
                        <a href="{% url 'panel:author_edit' author.pk %}" class="rounded-lg p-1.5 text-navy-500 transition hover:bg-navy-100 hover:text-navy-800" title="Tahrir">
                            <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
                        </a>
                        <a href="{% url 'panel:author_delete' author.pk %}" class="rounded-lg p-1.5 text-red-400 transition hover:bg-red-50 hover:text-red-600" title="O'chirish">
                            <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
                        </a>
                    </div>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="4" class="px-4 py-16 text-center text-sm text-navy-400">Muallif topilmadi.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
