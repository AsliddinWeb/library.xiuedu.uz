{% extends "panel/base.html" %}

{% block title %}Mualliflar — Kutubxonachi paneli{% endblock %}

{% block panel_content %}
<div class="flex flex-wrap items-center justify-between gap-4">
    <div>
        <h2 class="font-serif text-2xl font-semibold text-navy-900">Mualliflar</h2>
        <p class="mt-1 text-sm text-navy-500">Mualliflarni boshqaring</p>
    </div>
    <a href="{% url 'panel:author_create' %}" class="inline-flex items-center gap-2 rounded-lg bg-navy-900 px-5 py-2.5 text-sm font-semibold text-white shadow-soft transition hover:bg-navy-800">
        <svg class="h-4 w-4 text-gold-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 5v14M5 12h14"/></svg>
        Yangi muallif
    </a>
</div>

<div class="mt-5 rounded-xl border border-navy-100 bg-paper p-3 shadow-soft">
    <div class="relative max-w-xs">
        <span class="pointer-events-none absolute inset-y-0 left-3 flex items-center text-navy-400">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-4.3-4.3M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"/></svg>
        </span>
        <input type="search" name="q" value="{{ q }}" placeholder="Muallif ismi..." autocomplete="off"
               hx-get="{% url 'panel:authors' %}" hx-target="#author-table" hx-trigger="input changed delay:400ms, search"
               class="w-full rounded-lg border border-navy-200 bg-cream/40 py-2 pl-9 pr-3 text-sm focus:border-gold-400 focus:ring-2 focus:ring-gold-200 focus:outline-none">
    </div>
</div>

<div id="author-table" class="mt-5">
    {% include "panel/authors/_table.html" %}
</div>
{% endblock %}
