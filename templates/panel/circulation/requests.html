{% extends "panel/base.html" %}
{% block title %}Ijara so'rovlari — Kutubxonachi paneli{% endblock %}

{% block panel_content %}
<div class="flex flex-wrap items-center justify-between gap-4">
    <div>
        <h2 class="font-serif text-2xl font-semibold text-navy-900">Ijara so'rovlari</h2>
        <p class="mt-1 text-sm text-navy-500">Talabalar so'rovlarini tasdiqlang yoki rad eting</p>
    </div>
</div>

<div class="mt-5 flex flex-wrap items-center gap-3 rounded-xl border border-navy-100 bg-paper p-3 shadow-soft">
    <div id="req-filters" class="flex items-center gap-3">
        <select name="status" hx-get="{% url 'panel:requests' %}" hx-target="#req-table" hx-include="[name='q']" hx-trigger="change"
                class="rounded-lg border border-navy-200 bg-cream/40 py-2 pl-3 pr-8 text-sm focus:border-gold-400 focus:ring-2 focus:ring-gold-200 focus:outline-none">
            {% for val, label in statuses %}<option value="{{ val }}" {% if status == val %}selected{% endif %}>{{ label }}</option>{% endfor %}
        </select>
    </div>
    <div class="relative min-w-[200px] flex-1">
        <span class="pointer-events-none absolute inset-y-0 left-3 flex items-center text-navy-400">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-4.3-4.3M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"/></svg>
        </span>
        <input type="search" name="q" value="{{ q }}" placeholder="Kitob yoki talaba..." autocomplete="off"
               hx-get="{% url 'panel:requests' %}" hx-target="#req-table" hx-include="#req-filters" hx-trigger="input changed delay:400ms, search"
               class="w-full rounded-lg border border-navy-200 bg-cream/40 py-2 pl-9 pr-3 text-sm focus:border-gold-400 focus:ring-2 focus:ring-gold-200 focus:outline-none">
    </div>
</div>

<div id="req-table" class="mt-5">{% include "panel/circulation/_requests.html" %}</div>
{% endblock %}
