{% extends "panel/base.html" %}

{% block title %}Kitoblar — Kutubxonachi paneli{% endblock %}

{% block panel_content %}
{# Header #}
<div class="flex flex-wrap items-center justify-between gap-4">
    <div>
        <h2 class="font-serif text-2xl font-semibold text-navy-900">Kitoblar</h2>
        <p class="mt-1 text-sm text-navy-500"><span id="book-total">{{ total }}</span> ta kitob</p>
    </div>
    <a href="{% url 'panel:book_create' %}" class="inline-flex items-center gap-2 rounded-lg bg-navy-900 px-5 py-2.5 text-sm font-semibold text-white shadow-soft transition hover:bg-navy-800">
        <svg class="h-4 w-4 text-gold-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 5v14M5 12h14"/></svg>
        Yangi kitob
    </a>
</div>

{# Filtr panel #}
<div class="mt-5 flex flex-wrap items-center gap-3 rounded-xl border border-navy-100 bg-paper p-3 shadow-soft">
    <div class="relative min-w-[200px] flex-1">
        <span class="pointer-events-none absolute inset-y-0 left-3 flex items-center text-navy-400">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-4.3-4.3M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"/></svg>
        </span>
        <input type="search" name="q" value="{{ q }}" placeholder="Nom, ISBN yoki muallif..." autocomplete="off"
               hx-get="{% url 'panel:books' %}" hx-target="#book-table" hx-include="#book-filters" hx-trigger="input changed delay:400ms, search" hx-push-url="true"
               class="w-full rounded-lg border border-navy-200 bg-cream/40 py-2 pl-9 pr-3 text-sm focus:border-gold-400 focus:ring-2 focus:ring-gold-200 focus:outline-none">
    </div>
    <div id="book-filters" class="flex flex-wrap items-center gap-3">
        <select name="category" hx-get="{% url 'panel:books' %}" hx-target="#book-table" hx-include="[name='q'],#book-filters" hx-trigger="change" hx-push-url="true"
                class="rounded-lg border border-navy-200 bg-cream/40 py-2 pl-3 pr-8 text-sm focus:border-gold-400 focus:ring-2 focus:ring-gold-200 focus:outline-none">
            <option value="">Barcha kataloglar</option>
            {% for c in categories %}<option value="{{ c.id }}" {% if category == c.id|stringformat:'s' %}selected{% endif %}>{{ c.name }}</option>{% endfor %}
        </select>
        <select name="mode" hx-get="{% url 'panel:books' %}" hx-target="#book-table" hx-include="[name='q'],#book-filters" hx-trigger="change" hx-push-url="true"
                class="rounded-lg border border-navy-200 bg-cream/40 py-2 pl-3 pr-8 text-sm focus:border-gold-400 focus:ring-2 focus:ring-gold-200 focus:outline-none">
            <option value="">Har qanday tur</option>
            {% for val, label in modes %}<option value="{{ val }}" {% if mode == val %}selected{% endif %}>{{ label }}</option>{% endfor %}
        </select>
        <select name="active" hx-get="{% url 'panel:books' %}" hx-target="#book-table" hx-include="[name='q'],#book-filters" hx-trigger="change" hx-push-url="true"
                class="rounded-lg border border-navy-200 bg-cream/40 py-2 pl-3 pr-8 text-sm focus:border-gold-400 focus:ring-2 focus:ring-gold-200 focus:outline-none">
            <option value="">Holat: barchasi</option>
            <option value="1" {% if active_filter == '1' %}selected{% endif %}>Aktiv</option>
            <option value="0" {% if active_filter == '0' %}selected{% endif %}>Noaktiv</option>
        </select>
        <select name="sort" hx-get="{% url 'panel:books' %}" hx-target="#book-table" hx-include="[name='q'],#book-filters" hx-trigger="change" hx-push-url="true"
                class="rounded-lg border border-navy-200 bg-cream/40 py-2 pl-3 pr-8 text-sm focus:border-gold-400 focus:ring-2 focus:ring-gold-200 focus:outline-none">
            <option value="-id" {% if sort == '-id' %}selected{% endif %}>Yangi qo'shilgan</option>
            <option value="title" {% if sort == 'title' %}selected{% endif %}>Nom (A-Z)</option>
            <option value="-view_count" {% if sort == '-view_count' %}selected{% endif %}>Ommaboplik</option>
        </select>
    </div>
</div>

{# Jadval #}
<div id="book-table" class="mt-5">
    {% include "panel/books/_table.html" %}
</div>
{% endblock %}
