{% extends "panel/base.html" %}
{% block title %}Sharhlar — Kutubxonachi paneli{% endblock %}

{% block panel_content %}
<div>
    <h2 class="font-serif text-2xl font-semibold text-navy-900">Sharhlar</h2>
    <p class="mt-1 text-sm text-navy-500">Talabalar sharhlarini moderatsiya qiling</p>
</div>

<div class="mt-5 rounded-xl border border-navy-100 bg-paper p-3 shadow-soft">
    <select name="view" hx-get="{% url 'panel:reviews' %}" hx-target="#review-list" hx-trigger="change"
            class="rounded-lg border border-navy-200 bg-cream/40 py-2 pl-3 pr-8 text-sm focus:border-gold-400 focus:ring-2 focus:ring-gold-200 focus:outline-none">
        <option value="pending" {% if view == 'pending' %}selected{% endif %}>Kutilayotgan</option>
        <option value="approved" {% if view == 'approved' %}selected{% endif %}>Tasdiqlangan</option>
        <option value="all" {% if view == 'all' %}selected{% endif %}>Barchasi</option>
    </select>
</div>

<div id="review-list" class="mt-5">{% include "panel/system/_reviews.html" %}</div>
{% endblock %}
