{% load static %}
<header class="sticky top-0 z-20 flex h-16 items-center gap-4 border-b border-navy-100 bg-cream/90 px-4 backdrop-blur sm:px-6 lg:px-8">
    {# Mobil menyu #}
    <button @click="sidebar=true" class="inline-flex h-10 w-10 items-center justify-center rounded-lg text-navy-600 hover:bg-navy-50 lg:hidden" aria-label="Menyu">
        <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>

    {# Sahifa sarlavhasi #}
    <div class="min-w-0 flex-1">
        <h1 class="truncate font-serif text-lg font-semibold text-navy-900">{% block page_title %}{{ page_title|default:"Boshqaruv" }}{% endblock %}</h1>
    </div>

    {# Bildirishnoma #}
    <div x-data="{ bell: false }" class="relative">
        <button @click="bell = !bell" hx-get="{% url 'notifications:dropdown' %}" hx-target="#panel-notif" hx-swap="innerHTML"
                class="relative flex h-10 w-10 items-center justify-center rounded-full border border-navy-200 bg-paper text-navy-600 transition hover:border-navy-300" aria-label="Bildirishnomalar">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0"/></svg>
            {% if unread_notifications %}<span class="absolute -right-0.5 -top-0.5 flex h-5 min-w-5 items-center justify-center rounded-full bg-red-500 px-1 text-[10px] font-bold text-white">{{ unread_notifications }}</span>{% endif %}
        </button>
        <div x-show="bell" @click.outside="bell=false" x-cloak x-transition.origin.top.right
             class="absolute right-0 mt-2 w-80 overflow-hidden rounded-xl border border-navy-100 bg-paper shadow-lift">
            <div id="panel-notif" class="p-6 text-center text-sm text-navy-400">Yuklanmoqda…</div>
        </div>
    </div>

    {# Profil #}
    <div x-data="{ menu: false }" class="relative">
        <button @click="menu = !menu" class="flex items-center gap-2.5 rounded-full border border-navy-200 bg-paper py-1.5 pl-1.5 pr-3 transition hover:border-navy-300">
            <span class="flex h-7 w-7 items-center justify-center rounded-full bg-navy-900 text-xs font-semibold text-gold-300">{{ request.user.first_name|default:request.user.username|slice:":1"|upper }}</span>
            <span class="hidden max-w-[8rem] truncate text-sm font-medium text-navy-800 sm:block">{{ request.user.first_name|default:request.user.username }}</span>
        </button>
        <div x-show="menu" @click.outside="menu=false" x-cloak x-transition.origin.top.right
             class="absolute right-0 mt-2 w-48 overflow-hidden rounded-xl border border-navy-100 bg-paper py-1.5 shadow-lift">
            <div class="border-b border-navy-100 px-4 py-2.5">
                <p class="truncate text-sm font-semibold text-navy-900">{{ request.user.get_full_name }}</p>
                <p class="truncate text-xs text-navy-400">Kutubxonachi</p>
            </div>
            <a href="/" class="block px-4 py-2 text-sm text-navy-700 hover:bg-navy-50">Saytga qaytish</a>
            <a href="/auth/logout/" class="block border-t border-navy-100 px-4 py-2 text-sm font-medium text-red-600 hover:bg-red-50">Chiqish</a>
        </div>
    </div>
</header>
