{% if messages %}
<div class="pointer-events-none fixed right-4 top-20 z-50 flex w-80 max-w-[calc(100vw-2rem)] flex-col gap-2">
    {% for message in messages %}
    <div x-data="{ show: true }" x-show="show" x-init="setTimeout(() => show = false, 4500)"
         x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-x-4" x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0 translate-x-4"
         @click="show = false"
         class="pointer-events-auto flex items-start gap-3 rounded-xl bg-paper px-4 py-3 shadow-lift ring-1
         {% if message.tags == 'success' %}ring-emerald-100{% elif message.tags == 'danger' or message.tags == 'error' %}ring-red-100{% elif message.tags == 'warning' %}ring-gold-200{% else %}ring-navy-100{% endif %}">
        <span class="mt-0.5 flex-none {% if message.tags == 'success' %}text-emerald-500{% elif message.tags == 'danger' or message.tags == 'error' %}text-red-500{% elif message.tags == 'warning' %}text-gold-500{% else %}text-navy-500{% endif %}">
            {% if message.tags == 'success' %}
                <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/></svg>
            {% elif message.tags == 'danger' or message.tags == 'error' %}
                <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v4m0 4h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/></svg>
            {% else %}
                <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/></svg>
            {% endif %}
        </span>
        <p class="text-sm font-medium text-navy-800">{{ message }}</p>
    </div>
    {% endfor %}
</div>
{% endif %}
